      - paragraph [ref=f6e19]: אנחנו לא מוכרים דגמי רובוט קבועים מהמדף. כל פתרון — תעשייתי או דמוי-אדם — נבנה לפי הצורך המדויק של העסק שלכם, כולל התוכנה שמנהלת אותו, שאותה אנחנו מפתחים בעצמנו בישראל. פתרון B2B מלא המיועד לעסקים ולחברות — לא מוצר צריכה, ולא ניתן לרכישה מקוונת.
